<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплата не прошла — Мышление в эпоху ИИ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --white-70: rgba(255,255,255,0.7);
      --white-40: rgba(255,255,255,0.4);
      --white-15: rgba(255,255,255,0.15);
      --white-08: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.15);
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: #050402;
      color: var(--white);
      font-family: var(--font-body);
      font-weight: 400;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--white-08);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 3.5rem 3rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .state { display: none; }
    .state.active { display: block; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--white-15);
      border-top-color: var(--white-70);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin: 0 auto 1.75rem;
    }
    .icon-failed {
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.3);
      color: rgba(255,140,140,0.9);
    }
    .icon-success {
      background: rgba(124,247,192,0.1);
      border: 1px solid rgba(124,247,192,0.4);
      color: #7cf7c0;
    }

    .label {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white-40);
      margin-bottom: 1rem;
    }

    h1 {
      font-family: var(--font-head);
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 0.85rem;
    }

    p {
      font-size: 0.97rem;
      color: var(--white-70);
      line-height: 1.75;
    }

    .back-link {
      display: inline-block;
      margin-top: 2.25rem;
      font-size: 0.88rem;
      color: var(--white-40);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--white); }

    @media (max-width: 520px) {
      .card { padding: 2.5rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- LOADING -->
    <div class="state active" id="stateLoading">
      <div class="spinner"></div>
      <p style="color:var(--white-40);font-size:0.9rem;">Проверяем статус…</p>
    </div>

    <!-- FAILED (default) -->
    <div class="state" id="stateFailed">
      <div class="icon icon-failed">✕</div>
      <div class="label">Мышление в эпоху ИИ</div>
      <h1 id="failedTitle">Оплата не прошла</h1>
      <p id="failedMsg">Платёж не был завершён. Пожалуйста, попробуйте ещё раз.</p>
      <a href="/" class="back-link">← Попробовать снова</a>
    </div>

    <!-- UNEXPECTED SUCCESS (edge case: T-Bank redirected here but payment is confirmed) -->
    <div class="state" id="stateSuccess">
      <div class="icon icon-success">✓</div>
      <div class="label">Мышление в эпоху ИИ</div>
      <h1>Оплата прошла успешно</h1>
      <p>Ваш платёж получен.<br>Мы свяжемся с вами в ближайшее время.</p>
      <a href="/" class="back-link">← На главную</a>
    </div>

  </div>

  <script>
    const STATUS_MESSAGES = {
      REJECTED:         { title: 'Оплата отклонена',       msg: 'Банк отклонил платёж. Пожалуйста, проверьте данные карты или попробуйте другую карту.' },
      CANCELED:         { title: 'Оплата отменена',         msg: 'Платёж был отменён. Вы можете попробовать снова.' },
      DEADLINE_EXPIRED: { title: 'Время оплаты истекло',    msg: 'Время для завершения платежа истекло. Пожалуйста, оформите заявку заново.' },
    };

    const params  = new URLSearchParams(window.location.search);
    const orderId = params.get('orderId');

    function show(id) {
      document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    async function checkStatus() {
      if (!orderId) {
        show('stateFailed');
        return;
      }

      let data;
      try {
        const res = await fetch('/.netlify/functions/payment-status?orderId=' + encodeURIComponent(orderId));
        data = await res.json();
      } catch (err) {
        show('stateFailed');
        return;
      }

      // Edge case: payment is confirmed even though T-Bank redirected here
      if (data.paid) {
        show('stateSuccess');
        return;
      }

      // Show specific reason if known
      const match = STATUS_MESSAGES[data.status];
      if (match) {
        document.getElementById('failedTitle').textContent = match.title;
        document.getElementById('failedMsg').textContent   = match.msg;
      }

      show('stateFailed');
    }

    checkStatus();
  </script>
</body>
</html>
